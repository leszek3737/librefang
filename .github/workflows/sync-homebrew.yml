name: Sync to Homebrew Tap

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and calculate checksums
        id: assets
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          # Get asset URLs
          curl -sL "https://api.github.com/repos/librefang/librefang/releases/tags/$TAG" > releases.json

          # Get checksums
          for url in $(cat releases.json | jq -r '.assets[] | select(.name | endswith(".tar.gz") or endswith(".zip")) | .browser_download_url'); do
            sha=$(curl -sL "$url" | sha256sum | cut -d' ' -f1)
            echo "$url $sha" >> checksums.txt
          done

          cat checksums.txt

      - name: Generate formula
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          # Read checksums
          ARM64_DARWIN_SHA=$(grep "aarch64-apple-darwin" checksums.txt | awk '{print $2}')
          X86_DARWIN_SHA=$(grep "x86_64-apple-darwin" checksums.txt | awk '{print $2}')
          ARM64_LINUX_SHA=$(grep "aarch64-unknown-linux-gnu" checksums.txt | awk '{print $2}')
          X86_LINUX_SHA=$(grep "x86_64-unknown-linux-gnu" checksums.txt | awk '{print $2}')

          ARM64_DARWIN_URL=$(grep "aarch64-apple-darwin" checksums.txt | awk '{print $1}')
          X86_DARWIN_URL=$(grep "x86_64-apple-darwin" checksums.txt | awk '{print $1}')
          ARM64_LINUX_URL=$(grep "aarch64-unknown-linux-gnu" checksums.txt | awk '{print $1}')
          X86_LINUX_URL=$(grep "x86_64-unknown-linux-gnu" checksums.txt | awk '{print $1}')

          cat > Formula/librefang.rb <<EOF
class Librefang < Formula
  desc "Community-Maintained Agent Operating System written in Rust"
  homepage "https://librefang.ai"
  license "MIT"
  version "$VERSION"

  on_macos do
    if Hardware::CPU.arm?
      url "$ARM64_DARWIN_URL"
      sha256 "$ARM64_DARWIN_SHA"
    else
      url "$X86_DARWIN_URL"
      sha256 "$X86_DARWIN_SHA"
    end
  end

  on_linux do
    if Hardware::CPU.arm?
      url "$ARM64_LINUX_URL"
      sha256 "$ARM64_LINUX_SHA"
    else
      url "$X86_LINUX_URL"
      sha256 "$X86_LINUX_SHA"
    end
  end

  def install
    bin.install "librefang"
  end

  test do
    system "#{bin}/librefang", "--version"
  end
end
EOF

          cat Formula/librefang.rb

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update formula to ${{ github.event.release.tag_name }}" || echo "No changes"
          git push
